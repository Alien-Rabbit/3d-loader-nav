<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Camera Path Editor</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
    }

    #ui {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1b1b1b;
      padding: 10px;
      border-top: 1px solid #333;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    input,
    button {
      background: #222;
      color: #fff;
      border: 1px solid #333;
      padding: 6px;
    }

    button {
      cursor: pointer;
    }

    #recordingIndicator {
      display: none;
      color: red;
      font-weight: bold;
      animation: flash 0.5s infinite alternate;
    }

    @keyframes flash {
      from { opacity: 1; }
      to { opacity: 0.3; }
    }

    #consoleContainer {
      margin-top: 10px;
      border-top: 1px solid #333;
      padding-top: 10px;
    }

    #console {
      background: #111;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
      padding: 5px;
      border: 1px solid #333;
    }

    #clearConsole {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 4px 8px;
      cursor: pointer;
      margin-bottom: 5px;
    }

    #clearConsole:hover {
      background: #555;
    }

    #timeline {
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }

    .keyframe {
      background: #333;
      padding: 6px;
      border-radius: 4px;
      font-size: 12px;
      min-width: 120px;
    }

    #timelineWrapper {
      position: relative;
    }

    #scrubber {
      width: 100%;
      margin-bottom: 6px;
    }

    .keyframe {
      cursor: grab;
      user-select: none;
    }
  </style>
</head>

<body>

  <div id="three-container"></div>

  <div id="ui">
    <h2>Beady Eye 3D Model Viewer and Recorder</h2>
    <div class="row">

      <label>Model: <input type="file" id="glbUpload" accept=".glb,.obj,.fbx"></label>
      <label>Background: <input type="file" id="bgUpload" accept="image/*"></label>
      <button id="playPath">▶ Play Camera Path</button>
      <button onclick="startRecording()">⏺ Record</button>
      <button onclick="stopRecording()">⏹ Stop</button>
    </div>

    <div id="recordingIndicator">🔴 RECORDING</div>



    <div class="row">
      <label>X <input type="number" id="camX" step="0.1" value="0"></label>
      <label>Y <input type="number" id="camY" step="0.1" value="2"></label>
      <label>Z <input type="number" id="camZ" step="0.1" value="5"></label>
      <label>Time (ms) <input type="number" id="camT" value="2000"></label>
      <button id="addKey">＋ Add Keyframe</button>
    </div>

    <div class="row">
      <label>Look X <input id="lx" type="number" step="0.1"></label>
      <label>Y <input id="ly" type="number" step="0.1"></label>
      <label>Z <input id="lz" type="number" step="0.1"></label>
    </div>

<div id="timelineWrapper">
    <!-- SCRUBBER DEFINED HERE -->
    <input
        type="range"
        id="scrubber"
        min="0"
        max="1000"
        step="1"
        value="0"
    />

    <div id="timeline"></div>
</div>

    <div id="consoleContainer">
      <button id="clearConsole">Clear Console</button>
      <div id="console"></div>
    </div>

  <script src="main.js"></script>

</body>

</html>
